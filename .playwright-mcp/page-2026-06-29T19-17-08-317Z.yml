        - generic [ref=e294]:
          - heading "Frequently asked questions" [level=2] [ref=e295]
          - generic [ref=e296]:
            - generic [ref=e297]:
              - term [ref=e298]: How do I check if a domain name is available?
              - definition [ref=e299]: Enter the domain name you want into our domain checker and we instantly query authoritative registries worldwide using live WHOIS and RDAP lookups. Results appear in milliseconds showing whether your domain is available, taken, or listed as a premium name. No cached data, no guessing. You can check domain availability for a single name and see results across 800+ extensions simultaneously.
            - generic [ref=e300]:
              - term [ref=e301]: How do I check if a business name is available as a domain?
              - definition [ref=e302]: Type your business name into our domain availability checker and we'll show you which extensions are available across 800+ TLDs. Our TLD competitiveness score tells you what percentage of extensions are already taken. If most are available, that's a strong signal your business name is unique and brandable. If most are taken, you may be entering a crowded market. We also generate alternative domain name suggestions based on your business name.
            - generic [ref=e303]:
              - term [ref=e304]: Can I check multiple domain extensions at once?
              - definition [ref=e305]:
                - text: Yes. When you check domain availability for any name, our domain checker automatically queries 800+ TLDs including .com, .net, .org, .io, .ai, .dev, and many more. All results load simultaneously so you can compare options side by side without running separate searches. For checking multiple different domain names at once, try our
                - link "bulk domain search tool" [ref=e306] [cursor=pointer]:
                  - /url: /bulk-domain-search
                - text: .
            - generic [ref=e307]:
              - term [ref=e308]: Is domain availability checking free?
              - definition [ref=e309]: Yes, our domain checker is completely free with no limits. Check as many domain names as you want. Each search queries live registry data across 800+ extensions, compares registrar prices, and shows aftermarket options at no cost. We're an ICANN-accredited registrar, so availability results come directly from authoritative sources.
            - generic [ref=e310]:
              - term [ref=e311]: Are my domain searches private?
              - definition [ref=e312]: Yes. We do not log, store, or share your domain searches. Your queries go directly to registries for real-time availability checks and are not recorded. Unlike some domain checkers that may flag searched domains for registration by third parties, Instant Domain Search is an ICANN-accredited registrar committed to search privacy.
            - generic [ref=e313]:
              - term [ref=e314]: What's the difference between a domain search and a domain availability checker?
              - definition [ref=e315]:
                - text: A domain availability checker verifies whether a specific domain name is registered or available. It answers the question "is this exact name taken?" A
                - link "domain search" [ref=e316] [cursor=pointer]:
                  - /url: /
                - text: "is broader: it takes a keyword or idea and generates available domain name suggestions across multiple extensions. Our domain checker does both: check exact availability and discover alternatives, plus TLD competitiveness, registrar price comparisons, aftermarket listings, and a live preview of taken domains."
            - generic [ref=e317]:
              - term [ref=e318]: Why does a domain show as available but I can't register it?
              - definition [ref=e319]: This can happen for a few reasons. Some domains are reserved by registries, under trademark protection, or in a redemption grace period after expiring. Occasionally, a domain may be registered in the brief window between our availability check and your registration attempt. Our domain checker queries live registry data to minimize these cases.
            - generic [ref=e320]:
              - term [ref=e321]: How much does it cost to register a domain name?
              - definition [ref=e322]: Domain prices vary by extension and registrar. A .com typically costs $10–15 per year, while newer extensions like .io or .ai can range from $20 to $80+. Premium domains carry higher prices set by registries. Our domain availability checker shows side-by-side pricing from multiple registrars including GoDaddy, Namecheap, Shopify, and Hostinger so you can compare and find the best deal before you buy.
            - generic [ref=e323]:
              - term [ref=e324]: What happens after I check domain availability?
              - definition [ref=e325]: Once you find an available domain, you see purchase options with pricing from multiple registrar partners. For taken domains, you get a live website preview, aftermarket purchase options, TLD competitiveness scores showing how many of the 800+ extensions are still available, and AI-generated alternative name suggestions. You can save domains to compare later or check multiple names in one session.
            - generic [ref=e326]:
              - term [ref=e327]: How is this different from other domain checkers?
              - definition [ref=e328]: Most domain checkers only tell you if a name is available or taken. Ours checks 800+ TLDs simultaneously with live registry queries (not cached data), compares pricing across registrars, shows a TLD competitiveness score, provides aftermarket listings for taken domains, generates alternative name suggestions, and gives you a live preview of any taken domain's website. All in one search.
            - generic [ref=e329]:
              - term [ref=e330]: Can I buy a domain that's already taken?
              - definition [ref=e331]:
                - text: Yes. When you check domain availability and find a name is registered, our domain checker shows aftermarket purchase options from marketplaces like Dan.com, Sedo, Atom, and GoDaddy Afternic. You can see listed prices where available or make an offer directly through the marketplace. We also show alternative names and available extensions so you have multiple options. You can also browse
                - link "aftermarket domains" [ref=e332] [cursor=pointer]:
                  - /url: /aftermarket-domains
                - text: to find similar premium names for sale.
