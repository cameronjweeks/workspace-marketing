          - heading "Bulk domain search FAQ" [level=2] [ref=e982]
          - generic [ref=e983]:
            - generic [ref=e984]:
              - term [ref=e985]: What is bulk domain search and why use it?
              - definition [ref=e986]:
                - paragraph [ref=e987]: Bulk domain search is the fastest way to check availability for a list of domains at once — instead of one name at a time. Paste or upload up to 5,000 domains and see live registry availability, pricing across 20+ registrars, and SEO metrics in a single view. Useful for brand protection sweeps, portfolio audits, and keyword exploration.
            - generic [ref=e988]:
              - term [ref=e989]: How many domains can I check at once — is there a limit?
              - definition [ref=e990]:
                - paragraph [ref=e991]: You can check up to 5,000 domains in a single batch, free. For longer lists, run consecutive batches — there are no per-user rate limits, and we query live registry data in parallel so thousands of domains resolve in seconds. Paste directly into the search box or upload a CSV.
            - generic [ref=e992]:
              - term [ref=e993]: Is this bulk domain checker free?
              - definition [ref=e994]:
                - paragraph [ref=e995]: Yes — every feature is free with no signup required. Create an optional free account only if you want bookmarked domains to persist across devices. There is no paywall, no credit card, and no upgrade path blocking bulk availability checks.
            - generic [ref=e996]:
              - term [ref=e997]: Can I do a mass or batch domain check?
              - definition [ref=e998]:
                - paragraph [ref=e999]: "Yes — mass, batch, multi, and bulk are all synonyms for the same workflow, and this is the tool. Whether you phrase it as \"mass domain checker\", \"batch domain check\", or \"check multiple domains at once\", the input and output are identical: paste or upload a list, receive color-coded availability across every TLD you include."
            - generic [ref=e1000]:
              - term [ref=e1001]: How do I check multiple domain names at once?
              - definition [ref=e1002]:
                - paragraph [ref=e1003]:
                  - text: Paste your domains into the search box (one per line) or drop a CSV file. We auto-validate, deduplicate, and resolve the full list in parallel. You can mix entries with TLDs (
                  - code [ref=e1004]: example.com
                  - text: ) and without (
                  - code [ref=e1005]: example
                  - text: ) — the tool handles both and stacks TLDs for the bare names. For help generating variations, start in the
                  - link "domain generator" [ref=e1006] [cursor=pointer]:
                    - /url: /domain-generator
                  - text: and paste the output here.
            - generic [ref=e1007]:
              - term [ref=e1008]: What's the difference between bulk domain search, bulk domain lookup, and bulk WHOIS?
              - definition [ref=e1009]:
                - paragraph [ref=e1010]:
                  - strong [ref=e1011]: Bulk domain search
                  - text: (this tool) checks
                  - emphasis [ref=e1012]: availability
                  - text: — is the domain registered or available to register, and at what price.
                  - strong [ref=e1013]: Bulk domain lookup
                  - text: is often used interchangeably with availability, but sometimes means WHOIS — pulling the registrar, registrant, and expiry date for a list of already-registered domains. In our results, click any taken domain for the WHOIS, DNS, and history details. For expired-domain opportunities, see
                  - link "expired domains" [ref=e1014] [cursor=pointer]:
                    - /url: /expired-domains
                  - text: .
            - generic [ref=e1015]:
              - term [ref=e1016]: Do I need to create an account?
              - definition [ref=e1017]:
                - paragraph [ref=e1018]: No. Start searching immediately — no email, account, or credit card required. A free account only unlocks persistent bookmarks across devices; every lookup, filter, export, and registrar compare works without signing up.
            - generic [ref=e1019]:
              - term [ref=e1020]: What file format should I use for bulk domain import?
              - definition [ref=e1021]:
                - paragraph [ref=e1022]:
                  - text: CSV with one domain per line. Entries can include TLDs (
                  - code [ref=e1023]: example.com
                  - text: ) or just the base name (
                  - code [ref=e1024]: example
                  - text: ) — when you omit the TLD we stack your domain across the TLDs you include in other entries. We auto-strip whitespace, punctuation, and
                  - code [ref=e1025]: www.
                  - text: prefixes before running the batch.
