              - term [ref=e1042]: What's the difference between available, taken, and premium domains in bulk search?
              - definition [ref=e1043]:
                - generic [ref=e1044]:
                  - paragraph [ref=e1045]: "When scanning the color grid:"
                  - list [ref=e1046]:
                    - listitem [ref=e1047]:
